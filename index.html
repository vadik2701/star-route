<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STAR Route Planner</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app-shell">
<aside class="sidebar left">
<div class="brand"><h1>STAR Route</h1></div>

<div class="panel">
<input id="routeNameInput" placeholder="Назва маршруту"/>
<select id="driverSelect"></select>
<button id="newRouteBtn">Створити маршрут</button>
</div>

<div id="routesList"></div>
</aside>

<main class="map-wrap">
<div id="map"></div>
</main>

<aside class="sidebar right">
<div class="panel">
<input id="homeInput" placeholder="Домашня точка"/>
<div id="homeSuggestions"></div>
<button id="saveHomeBtn">Зберегти дім</button>
</div>

<div class="panel">
<input id="addressInput" placeholder="Адреса"/>
<div id="suggestions"></div>
</div>

<div class="panel">
<button id="optimizeBtn">Оптимізувати</button>
<button id="routeBtn">Маршрут</button>
</div>

<div id="stopsList"></div>
</aside>
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<script src="script.js"></script>
</body>
</html>
