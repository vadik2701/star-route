<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STAR Route Planner</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar left">
      <div class="brand">
        <div class="brand-kicker">DISPATCH MODE</div>
        <h1>STAR Route Planner</h1>
        <p>Дім → доставки → дім</p>
      </div>

      <div class="panel">
        <div class="panel-title">Новий маршрут</div>
        <input id="routeNameInput" type="text" placeholder="Назва маршруту" class="mb10" />
        <select id="driverSelect" class="select mb10"></select>
        <button id="newRouteBtn" class="primary full" type="button">Створити маршрут</button>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">Маршрути</div>
          <button id="deleteRouteBtn" class="ghost-btn" type="button">Видалити</button>
        </div>
        <div id="routesList" class="routes-list"></div>
      </div>
    </aside>

    <main class="map-wrap">
      <div id="map"></div>
      <div class="map-overlay">
        <div class="overlay-title" id="activeRouteTitle">Маршрут</div>
        <div class="overlay-sub" id="activeRouteMeta">Mapbox Directions API</div>
      </div>
      <div id="mapError" class="map-error hidden"></div>
    </main>

    <aside class="sidebar right">
      <div class="right-scroll">
        <div class="panel">
          <div class="panel-title">Домашня точка водія</div>
          <div class="subnote">Дім використовується як старт і фініш, але не входить у нумерацію доставок.</div>
          <input id="homeInput" type="text" placeholder="Введи домашню точку" />
          <div id="homeStatus" class="muted"></div>
          <div id="homeSuggestions" class="suggestions"></div>
          <button id="saveHomeBtn" class="full top10" type="button">Зберегти дім</button>
        </div>

        <div class="panel">
          <div class="panel-title">Додати доставку</div>
          <input id="addressInput" type="text" placeholder="Місто, вулиця, будинок" autocomplete="off" />
          <div id="searchStatus" class="muted"></div>
          <div id="suggestions" class="suggestions"></div>
        </div>

        <div class="panel">
          <div class="panel-title">Маршрут</div>
          <div class="stats">
            <div><span>Доставок</span><strong id="stopCount">0</strong></div>
            <div><span>Км</span><strong id="routeKm">0</strong></div>
            <div><span>Час</span><strong id="routeTime">0 хв</strong></div>
          </div>
          <div class="actions top10">
            <button id="optimizeBtn" class="primary" type="button">Оптимізувати</button>
            <button id="routeBtn" class="primary" type="button">Побудувати</button>
          </div>
          <div class="actions top10">
            <button id="clearBtn" class="full" type="button">Очистити доставки</button>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">Точки маршруту</div>
          <div id="stopsList" class="stops-list"></div>
        </div>

        <div class="panel">
          <div class="panel-title">Водії</div>
          <div id="driversList" class="drivers-list"></div>
        </div>
      </div>
    </aside>
  </div>

  <div id="renameModal" class="modal hidden">
    <div class="modal-card">
      <div class="panel-title">Перейменувати водія</div>
      <input id="renameDriverInput" type="text" placeholder="Нова назва водія" />
      <div class="actions top10">
        <button id="saveDriverNameBtn" class="primary full" type="button">Зберегти</button>
        <button id="cancelDriverNameBtn" class="full" type="button">Скасувати</button>
      </div>
    </div>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <script src="script.js"></script>
</body>
</html>
