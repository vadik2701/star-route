<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STAR Route Planner</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar left">
      <div class="brand">
        <div class="brand-kicker">Dispatch mode</div>
        <h1>STAR Route Planner</h1>
        <p>Маршрут по дорогах на Mapbox.</p>
      </div>

      <div class="panel">
        <div class="panel-title">Додати адресу</div>
        <div class="search-row">
          <input id="addressInput" type="text" placeholder="Місто, вулиця, будинок" autocomplete="off" />
          <button id="searchBtn">Знайти</button>
        </div>
        <div id="searchStatus" class="muted"></div>
        <div id="suggestions" class="suggestions"></div>
      </div>

      <div class="panel">
        <div class="panel-title">Маршрут</div>
        <div class="stats">
          <div><span>Точок</span><strong id="stopCount">0</strong></div>
          <div><span>Км</span><strong id="routeKm">0</strong></div>
          <div><span>Час</span><strong id="routeTime">0 хв</strong></div>
        </div>
        <div class="actions">
          <button id="routeBtn" class="primary">Побудувати по дорогах</button>
          <button id="clearBtn">Очистити</button>
        </div>
      </div>
    </aside>

    <main class="map-wrap">
      <div id="map"></div>
      <div class="map-overlay">
        <div class="overlay-title">Road routing</div>
        <div class="overlay-sub">Mapbox Directions API</div>
      </div>
    </main>

    <aside class="sidebar right">
      <div class="panel">
        <div class="panel-title">Точки маршруту</div>
        <div id="stopsList" class="stops-list"></div>
      </div>
    </aside>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <script src="script.js"></script>
</body>
</html>
