<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STAR Route Planner</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar left">
      <div class="brand">
        <div class="brand-kicker">Dispatch mode</div>
        <h1>STAR Route Planner</h1>
        <p>Маршрути, водії, автопідказки адрес і збереження.</p>
      </div>

      <div class="panel">
        <div class="panel-title">Новий маршрут</div>
        <input id="routeNameInput" type="text" placeholder="Назва маршруту" class="mb10" />
        <select id="driverSelect" class="select mb10"></select>
        <div class="actions">
          <button id="newRouteBtn" class="primary">Створити маршрут</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Маршрути</div>
        <div id="routesList" class="routes-list"></div>
      </div>
    </aside>

    <main class="map-wrap">
      <div id="map"></div>
      <div class="map-overlay">
        <div class="overlay-title" id="activeRouteTitle">Маршрут</div>
        <div class="overlay-sub" id="activeRouteMeta">Mapbox Directions API</div>
      </div>
      <div id="mapError" class="map-error hidden"></div>
    </main>

    <aside class="sidebar right">
      <div class="panel">
        <div class="panel-title">Додати адресу</div>
        <input id="addressInput" type="text" placeholder="Місто, вулиця, будинок" autocomplete="off" />
        <div id="searchStatus" class="muted"></div>
        <div id="suggestions" class="suggestions"></div>
      </div>

      <div class="panel">
        <div class="panel-title">Маршрут</div>
        <div class="stats">
          <div><span>Точок</span><strong id="stopCount">0</strong></div>
          <div><span>Км</span><strong id="routeKm">0</strong></div>
          <div><span>Час</span><strong id="routeTime">0 хв</strong></div>
        </div>
        <div class="actions">
          <button id="routeBtn" class="primary">Побудувати по дорогах</button>
          <button id="clearBtn">Очистити</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Точки маршруту</div>
        <div id="stopsList" class="stops-list"></div>
      </div>

      <div class="panel">
        <div class="panel-title">Водії</div>
        <div id="driversList" class="drivers-list"></div>
      </div>
    </aside>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <script src="script.js"></script>
</body>
</html>
